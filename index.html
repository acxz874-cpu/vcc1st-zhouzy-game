<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>像素地牢 · 法师清怪</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background:#0a0a0f; display:flex; align-items:center; justify-content:center;
    height:100vh; font-family:'Microsoft YaHei',sans-serif; overflow:hidden;
}
canvas {
    image-rendering:pixelated; image-rendering:crisp-edges;
    border:2px solid #2a2a3a; border-radius:4px;
    max-width:100vw; max-height:100vh;
}
#loading {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:#0a0a0f; display:flex; align-items:center; justify-content:center;
    flex-direction:column; z-index:100; color:#888; font-size:14px; letter-spacing:2px;
}
#loading .bar { width:200px; height:4px; background:#1a1a2a; border-radius:2px; margin-top:12px; }
#loading .fill { height:100%; background:#6b8cff; border-radius:2px; width:0%; transition:width 0.2s; }
</style>
</head>
<body>

<div id="loading">
    <div>加载素材中...</div>
    <div class="bar"><div class="fill" id="loadBar"></div></div>
</div>

<canvas id="game"></canvas>

<script>
/* ================================================================
   2D复古像素RPG · 法师清怪闯关 v2
   ================================================================ */

// ===== 常量 =====
const CANVAS_W = 960;
const CANVAS_H = 540;
const PLAYER_SPEED = 3;
const GOBLIN_SPEED = 1.2;
const GOBLIN_CHASE_SPEED = 2.0;
const SPRITE_SCALE = 0.18;
const GOBLIN_SCALE = 0.15;
const EFFECT_SCALE = 0.12;

// 地面Y坐标（根据新版地平线参考图红线位置）
const FLOOR_Y_1 = 442;          // 第一层（下层）地面Y
const FLOOR_Y_2 = 200;          // 第二层（上层）地面Y

// HP与伤害
const PLAYER_MAX_HP = 100;
const GOBLIN_MAX_HP = 75;
const PLAYER_DMG = 25;
const PLAYER_CRIT_DMG = 50;
const CRIT_CHANCE = 0.2;
const GOBLIN_DMG = 20;

// 战斗参数
const AGGRO_RANGE = 200;        // 仇恨触发距离
const GOBLIN_ATK_RANGE = 50;    // 哥布林攻击距离
const PROJECTILE_SPEED = 6;     // 弹射速度
const PROJECTILE_RANGE = 270;   // 射程（原90*3）

// 跳跃参数
const JUMP_VELOCITY = -8;
const GRAVITY = 0.35;

// 二层地面断裂区域（蓝色方块标记位置，画布坐标）
const GAP_LEFT = 430;
const GAP_RIGHT = 510;

// ===== 资源加载 =====
const assets = {};
const toLoad = [];

function regImg(key, src) { toLoad.push({ key, src }); }

// 法师序列帧
for (let i = 1; i <= 6; i++) regImg(`mage-idle-${i}`, `assets/sprites/mage-idle/${i}.png`);
for (let i = 1; i <= 6; i++) regImg(`mage-attack-${i}`, `assets/sprites/mage-attack/${i}.png`);
for (let i = 1; i <= 3; i++) regImg(`mage-move-${i}`, `assets/sprites/mage-move/${i}.png`);
// 法师攻击效果
for (let i = 1; i <= 4; i++) regImg(`mage-effect-${i}`, `assets/sprites/mage-effect/${i}.png`);
// 哥布林序列帧
for (let i = 1; i <= 3; i++) regImg(`goblin-move-${i}`, `assets/sprites/goblin-move/${i}.png`);
for (let i = 1; i <= 6; i++) regImg(`goblin-attack-${i}`, `assets/sprites/goblin-attack/${i}.png`);
for (let i = 1; i <= 4; i++) regImg(`goblin-death-${i}`, `assets/sprites/goblin-death/${i}.png`);
// 地图
regImg('dungeon-1', 'assets/maps/dungeon-1.jpg');

function loadAll() {
    return new Promise((resolve) => {
        let loaded = 0;
        const bar = document.getElementById('loadBar');
        for (const item of toLoad) {
            const img = new Image();
            img.onload = () => {
                assets[item.key] = img;
                loaded++;
                bar.style.width = (loaded / toLoad.length * 100) + '%';
                if (loaded === toLoad.length) resolve();
            };
            img.onerror = () => {
                console.warn('Failed to load:', item.src);
                loaded++;
                bar.style.width = (loaded / toLoad.length * 100) + '%';
                if (loaded === toLoad.length) resolve();
            };
            img.src = item.src;
        }
    });
}

// ===== 输入 =====
const keys = {};
const justPressed = {};
window.addEventListener('keydown', e => {
    if (!keys[e.code]) justPressed[e.code] = true;
    keys[e.code] = true;
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
let mouseClicked = false;
window.addEventListener('mousedown', () => { mouseClicked = true; });

function consumeKey(code) {
    if (justPressed[code]) { justPressed[code] = false; return true; }
    return false;
}

// ===== Canvas =====
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');
cvs.width = CANVAS_W;
cvs.height = CANVAS_H;

// ===== 精灵动画类 =====
class SpriteAnim {
    constructor(frames, fps = 8, loop = true) {
        this.frames = frames;
        this.fps = fps;
        this.loop = loop;
        this.idx = 0;
        this.timer = 0;
        this.done = false;
    }
    reset() { this.idx = 0; this.timer = 0; this.done = false; }
    update(dt) {
        if (this.done) return;
        this.timer += dt;
        if (this.timer >= 1 / this.fps) {
            this.timer -= 1 / this.fps;
            this.idx++;
            if (this.idx >= this.frames.length) {
                if (this.loop) { this.idx = 0; }
                else { this.idx = this.frames.length - 1; this.done = true; }
            }
        }
    }
    getFrame() { return this.frames[this.idx]; }
}

// ===== 伤害飘字系统 =====
const floatingTexts = [];
function addFloatingText(x, y, value, isCrit) {
    floatingTexts.push({ x, y, value, isCrit, life: 1.0, vy: -1.5 });
}
function updateFloatingTexts(dt) {
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const ft = floatingTexts[i];
        ft.y += ft.vy;
        ft.life -= dt;
        if (ft.life <= 0) floatingTexts.splice(i, 1);
    }
}
function drawFloatingTexts(ctx) {
    for (const ft of floatingTexts) {
        const alpha = Math.min(1, ft.life * 2);
        const size = ft.isCrit ? 18 : 14;
        const color = ft.isCrit ? `rgba(255,60,60,${alpha})` : `rgba(255,255,255,${alpha})`;
        ctx.font = `bold ${size}px "Microsoft YaHei", sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.strokeStyle = `rgba(0,0,0,${alpha * 0.8})`;
        ctx.lineWidth = 3;
        ctx.strokeText(ft.value, ft.x, ft.y);
        ctx.fillStyle = color;
        ctx.fillText(ft.value, ft.x, ft.y);
    }
}

// ===== 弹射物系统 =====
const projectiles = [];

function spawnProjectile(x, y, dir) {
    projectiles.push({
        x, y, dir, startX: x, alive: true,
        anim: new SpriteAnim(
            Array.from({length: 4}, (_, i) => assets[`mage-effect-${i + 1}`]), 10),
        hitParticles: null
    });
}

function updateProjectiles(dt) {
    for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        if (!p.alive) {
            // 命中粒子效果
            if (p.hitParticles) {
                p.hitParticles.life -= dt;
                if (p.hitParticles.life <= 0) projectiles.splice(i, 1);
            } else {
                projectiles.splice(i, 1);
            }
            continue;
        }
        p.x += PROJECTILE_SPEED * p.dir;
        p.anim.update(dt);

        // 超出射程或画面边界
        if (Math.abs(p.x - p.startX) > PROJECTILE_RANGE || p.x < -20 || p.x > CANVAS_W + 20) {
            projectiles.splice(i, 1);
            continue;
        }

        // 命中检测
        const goblins = game.getCurrentGoblins();
        for (const g of goblins) {
            if (g.dead || g.dying) continue;
            const dx = Math.abs(p.x - g.x);
            if (dx < 40) {
                // 命中！
                p.alive = false;
                p.hitParticles = { x: p.x, y: p.y, life: 0.3 };
                const isCrit = Math.random() < CRIT_CHANCE;
                const dmg = isCrit ? PLAYER_CRIT_DMG : PLAYER_DMG;
                g.takeHit(dmg, isCrit);
                break;
            }
        }
    }
}

function drawProjectiles(ctx) {
    for (const p of projectiles) {
        if (p.alive) {
            const frame = p.anim.getFrame();
            if (!frame) continue;
            const w = frame.width * EFFECT_SCALE;
            const h = frame.height * EFFECT_SCALE;
            ctx.save();
            ctx.translate(p.x, p.y);
            if (p.dir === -1) ctx.scale(-1, 1);
            ctx.drawImage(frame, -w / 2, -h / 2, w, h);
            ctx.restore();
        } else if (p.hitParticles) {
            // 蓝色像素粒子命中特效
            const hp = p.hitParticles;
            const alpha = hp.life / 0.3;
            ctx.save();
            ctx.globalAlpha = alpha;
            for (let j = 0; j < 8; j++) {
                const angle = (j / 8) * Math.PI * 2 + (1 - hp.life) * 3;
                const dist = (1 - hp.life / 0.3) * 25;
                const px = hp.x + Math.cos(angle) * dist;
                const py = hp.y + Math.sin(angle) * dist;
                const size = 2 + Math.random() * 2;
                ctx.fillStyle = j % 2 === 0 ? '#4fc3f7' : '#0288d1';
                ctx.fillRect(px - size / 2, py - size / 2, size, size);
            }
            ctx.restore();
        }
    }
}

// ===== 玩家法师 =====
const player = {
    x: 100,
    y: FLOOR_Y_1,
    vy: 0,
    hp: PLAYER_MAX_HP,
    facing: 1,
    state: 'idle',     // idle | move | attack | jump | falling
    grounded: true,
    anims: {},
    currentAnim: null,
    attackHitChecked: false,
    idleCooldown: 5.0,
    idlePlaying: false,
    hurtFlashTimer: 0,

    init() {
        this.anims.idle = new SpriteAnim(
            Array.from({length: 6}, (_, i) => assets[`mage-idle-${i + 1}`]), 6, false);
        this.anims.move = new SpriteAnim(
            Array.from({length: 3}, (_, i) => assets[`mage-move-${i + 1}`]), 8);
        this.anims.attack = new SpriteAnim(
            Array.from({length: 6}, (_, i) => assets[`mage-attack-${i + 1}`]), 10, false);
        // 跳跃用移动帧
        this.anims.jump = new SpriteAnim(
            Array.from({length: 3}, (_, i) => assets[`mage-move-${i + 1}`]), 6, false);
        this.currentAnim = this.anims.idle;
    },

    reset() {
        this.hp = PLAYER_MAX_HP;
        this.vy = 0;
        this.grounded = true;
        this.state = 'idle';
        this.hurtFlashTimer = 0;
        this.idleCooldown = 5.0;
        this.idlePlaying = false;
    },

    takeDamage(dmg) {
        this.hp -= dmg;
        this.hurtFlashTimer = 0.3;
        if (this.hp <= 0) {
            this.hp = 0;
            game.state = 'gameover';
            game.gameoverTimer = 0;
        }
    },

    getFloorY() {
        return game.currentLayer === 1 ? FLOOR_Y_1 : FLOOR_Y_2;
    },

    isOverGap() {
        // 只有二层有断裂
        if (game.currentLayer !== 2) return false;
        return this.x > GAP_LEFT && this.x < GAP_RIGHT;
    },

    update(dt) {
        if (game.state === 'gameover') return;

        // 受击闪烁计时
        if (this.hurtFlashTimer > 0) this.hurtFlashTimer -= dt;

        const floorY = this.getFloorY();

        // 攻击动画结束后回到idle
        if (this.state === 'attack' && this.anims.attack.done) {
            this.state = this.grounded ? 'idle' : 'jump';
            this.idleCooldown = 5.0;
            this.idlePlaying = false;
        }

        // 跳跃/下落物理
        if (!this.grounded) {
            this.vy += GRAVITY;
            this.y += this.vy;

            // 检查是否落在断裂区域
            if (this.y >= floorY) {
                if (this.isOverGap()) {
                    // 从二层掉落到一层
                    game.currentLayer = 1;
                    this.y = FLOOR_Y_1;
                    this.vy = 0;
                    this.grounded = true;
                    this.state = 'idle';
                } else {
                    this.y = floorY;
                    this.vy = 0;
                    this.grounded = true;
                    if (this.state === 'jump') this.state = 'idle';
                }
            }
        } else {
            // 站在地面上时检查是否踩在断裂上
            if (this.isOverGap()) {
                this.grounded = false;
                this.vy = 0;
                // 从二层掉到一层
            }
        }

        // 输入处理（攻击中不能移动，但可以在空中攻击）
        if (this.state !== 'attack') {
            let moving = false;
            if (keys['ArrowLeft'] || keys['KeyA']) {
                this.x -= PLAYER_SPEED;
                this.facing = -1;
                moving = true;
            }
            if (keys['ArrowRight'] || keys['KeyD']) {
                this.x += PLAYER_SPEED;
                this.facing = 1;
                moving = true;
            }

            // 跳跃（空格）
            if (consumeKey('Space') && this.grounded) {
                this.grounded = false;
                this.vy = JUMP_VELOCITY;
                this.state = 'jump';
                this.anims.jump.reset();
            }

            // 攻击（J键或鼠标）
            if (consumeKey('KeyJ') || mouseClicked) {
                mouseClicked = false;
                this.state = 'attack';
                this.currentAnim = this.anims.attack;
                this.currentAnim.reset();
                this.attackHitChecked = false;
            } else if (this.grounded) {
                if (this.state !== 'jump') {
                    this.state = moving ? 'move' : 'idle';
                }
            }
        }
        mouseClicked = false;

        // 更新动画
        if (this.state === 'idle') {
            if (!this.idlePlaying) {
                this.idleCooldown -= dt;
                if (this.idleCooldown <= 0) {
                    this.idlePlaying = true;
                    this.anims.idle.reset();
                }
                this.currentAnim = this.anims.idle;
                this.anims.idle.idx = 0;
            } else {
                this.currentAnim = this.anims.idle;
                this.anims.idle.update(dt);
                if (this.anims.idle.done) {
                    this.idlePlaying = false;
                    this.idleCooldown = 5.0;
                }
            }
        } else if (this.state === 'move') {
            this.currentAnim = this.anims.move;
            this.currentAnim.update(dt);
        } else if (this.state === 'attack') {
            this.currentAnim.update(dt);
        } else if (this.state === 'jump') {
            this.currentAnim = this.anims.jump;
            this.currentAnim.update(dt);
        }

        // 攻击第5帧发射弹射物（idx=4，从0开始）
        if (this.state === 'attack' && !this.attackHitChecked && this.anims.attack.idx >= 4) {
            this.attackHitChecked = true;
            spawnProjectile(this.x + this.facing * 30, this.y - 60, this.facing);
        }

        // 限制在地图范围内
        if (this.x < 30) this.x = 30;
    },

    draw(ctx) {
        const frame = this.currentAnim ? this.currentAnim.getFrame() : null;
        if (!frame) return;

        // 受击闪烁
        if (this.hurtFlashTimer > 0 && Math.floor(this.hurtFlashTimer * 15) % 2 === 0) return;

        const w = frame.width * SPRITE_SCALE;
        const h = frame.height * SPRITE_SCALE;
        ctx.save();
        ctx.translate(this.x, this.y);
        if (this.facing === -1) ctx.scale(-1, 1);
        ctx.drawImage(frame, -w / 2, -h, w, h);
        ctx.restore();
    }
};

// ===== 哥布林 =====
class Goblin {
    constructor(x, y, patrolMin, patrolMax) {
        this.x = x;
        this.y = y;
        this.patrolMin = patrolMin;
        this.patrolMax = patrolMax;
        this.dir = 1;
        this.hp = GOBLIN_MAX_HP;
        this.dead = false;       // 彻底消失
        this.dying = false;      // 播放死亡动画中
        this.inCombat = false;   // 仇恨战斗模式
        this.flashTimer = 0;     // 受击红色闪烁
        this.atkCooldown = 0;    // 攻击冷却
        this.isAttacking = false;

        this.anims = {
            move: new SpriteAnim(
                Array.from({length: 3}, (_, i) => assets[`goblin-move-${i + 1}`]), 6),
            attack: new SpriteAnim(
                Array.from({length: 6}, (_, i) => assets[`goblin-attack-${i + 1}`]), 8, false),
            death: new SpriteAnim(
                Array.from({length: 4}, (_, i) => assets[`goblin-death-${i + 1}`]), 6, false),
        };
        this.currentAnim = this.anims.move;
    }

    takeHit(dmg, isCrit) {
        if (this.dead || this.dying) return;
        this.hp -= dmg;
        this.flashTimer = 1.0;  // 1秒红色闪烁
        this.inCombat = true;
        addFloatingText(this.x, this.y - 100, dmg, isCrit);
        if (this.hp <= 0) {
            this.hp = 0;
            this.dying = true;
            this.isAttacking = false;
            this.currentAnim = this.anims.death;
            this.currentAnim.reset();
            game.checkWin();
        }
    }

    update(dt) {
        if (this.dead) return;

        // 死亡动画播放
        if (this.dying) {
            this.currentAnim.update(dt);
            if (this.currentAnim.done) {
                this.dead = true;
            }
            return;
        }

        // 受击闪烁
        if (this.flashTimer > 0) this.flashTimer -= dt;

        // 攻击冷却
        if (this.atkCooldown > 0) this.atkCooldown -= dt;

        // 检查仇恨范围
        if (!this.inCombat && game.currentLayer === (this.y === FLOOR_Y_1 ? 1 : 2)) {
            const dx = Math.abs(player.x - this.x);
            if (dx < AGGRO_RANGE) {
                this.inCombat = true;
            }
        }

        if (this.inCombat && game.currentLayer === (this.y === FLOOR_Y_1 ? 1 : 2)) {
            // 战斗模式：朝法师移动
            const dx = player.x - this.x;
            const dist = Math.abs(dx);

            if (this.isAttacking) {
                // 攻击动画播放中
                this.currentAnim.update(dt);
                // 攻击第4帧判定伤害
                if (this.anims.attack.idx >= 3 && !this._atkHit) {
                    this._atkHit = true;
                    if (Math.abs(player.x - this.x) < GOBLIN_ATK_RANGE + 20) {
                        player.takeDamage(GOBLIN_DMG);
                    }
                }
                if (this.currentAnim.done) {
                    this.isAttacking = false;
                    this.atkCooldown = 1.0;
                    this.currentAnim = this.anims.move;
                }
            } else if (dist < GOBLIN_ATK_RANGE && this.atkCooldown <= 0) {
                // 进入攻击
                this.isAttacking = true;
                this._atkHit = false;
                this.dir = dx > 0 ? 1 : -1;
                this.currentAnim = this.anims.attack;
                this.currentAnim.reset();
            } else {
                // 追击
                this.dir = dx > 0 ? 1 : -1;
                this.x += GOBLIN_CHASE_SPEED * this.dir;
                this.currentAnim = this.anims.move;
                this.currentAnim.update(dt);
            }
        } else {
            // 非战斗：巡逻
            this.x += GOBLIN_SPEED * this.dir;
            if (this.x >= this.patrolMax) { this.x = this.patrolMax; this.dir = -1; }
            if (this.x <= this.patrolMin) { this.x = this.patrolMin; this.dir = 1; }
            this.currentAnim = this.anims.move;
            this.currentAnim.update(dt);
        }
    },

    draw(ctx) {
        if (this.dead) return;

        const frame = this.currentAnim.getFrame();
        if (!frame) return;
        const w = frame.width * GOBLIN_SCALE;
        const h = frame.height * GOBLIN_SCALE;

        ctx.save();
        ctx.translate(this.x, this.y);
        if (this.dir === -1) ctx.scale(-1, 1);

        // 受击红色闪烁效果（红色叠色，不隐藏）
        if (this.flashTimer > 0 && Math.floor(this.flashTimer * 8) % 2 === 0) {
            ctx.drawImage(frame, -w / 2, -h, w, h);
            ctx.globalCompositeOperation = 'source-atop';
            ctx.fillStyle = 'rgba(255,0,0,0.4)';
            ctx.fillRect(-w / 2, -h, w, h);
            ctx.globalCompositeOperation = 'source-over';
        } else {
            ctx.drawImage(frame, -w / 2, -h, w, h);
        }
        ctx.restore();

        // 血条（仅战斗模式显示，死亡时隐藏）
        if (this.inCombat && !this.dying) {
            this.drawHPBar(ctx);
        }
    },

    drawHPBar(ctx) {
        const barW = 40;
        const barH = 5;
        const bx = this.x - barW / 2;
        const by = this.y - 110;
        const ratio = this.hp / GOBLIN_MAX_HP;

        // 底色
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(bx - 1, by - 1, barW + 2, barH + 2);
        // 血量
        ctx.fillStyle = ratio > 0.5 ? '#44cc44' : ratio > 0.25 ? '#cccc44' : '#cc4444';
        ctx.fillRect(bx, by, barW * ratio, barH);
        // 边框
        ctx.strokeStyle = '#666';
        ctx.lineWidth = 1;
        ctx.strokeRect(bx - 1, by - 1, barW + 2, barH + 2);
    }
}

// ===== 游戏主控 =====
const game = {
    state: 'title',    // title | play | transition | clear | nextLevel | gameover
    currentLayer: 1,
    level: 1,
    goblinsL1: [],
    goblinsL2: [],
    transTimer: 0,
    clearTimer: 0,
    gameoverTimer: 0,
    mapImg: null,

    init() {
        this.mapImg = assets['dungeon-1'];
        player.init();
        this.startLevel();
    },

    startLevel() {
        this.currentLayer = 1;
        player.x = 100;
        player.y = FLOOR_Y_1;
        player.reset();
        player.facing = 1;
        player.currentAnim = player.anims.idle;

        projectiles.length = 0;
        floatingTexts.length = 0;

        // 第一层2只哥布林
        this.goblinsL1 = [
            new Goblin(350, FLOOR_Y_1, 150, 500),
            new Goblin(750, FLOOR_Y_1, 550, 900),
        ];
        // 第二层2只哥布林
        this.goblinsL2 = [
            new Goblin(250, FLOOR_Y_2, 80, 400),
            new Goblin(700, FLOOR_Y_2, 540, 880),
        ];
    },

    getCurrentGoblins() {
        return this.currentLayer === 1 ? this.goblinsL1 : this.goblinsL2;
    },

    checkWin() {
        const allDead = [...this.goblinsL1, ...this.goblinsL2].every(g => g.dead || g.dying);
        // 等所有dying动画也完成
        if (allDead) {
            // 延迟检查，等死亡动画播完
            setTimeout(() => {
                const reallyDead = [...this.goblinsL1, ...this.goblinsL2].every(g => g.dead);
                if (reallyDead && this.state === 'play') {
                    this.state = 'clear';
                    this.clearTimer = 2.0;
                }
            }, 800);
        }
    },

    update(dt) {
        if (this.state === 'title') {
            if (consumeKey('Space') || consumeKey('Enter') || mouseClicked) {
                mouseClicked = false;
                this.state = 'play';
            }
            return;
        }

        if (this.state === 'gameover') {
            this.gameoverTimer += dt;
            if (this.gameoverTimer > 1.0 && (consumeKey('Space') || consumeKey('Enter') || mouseClicked)) {
                mouseClicked = false;
                this.state = 'play';
                this.startLevel();
            }
            return;
        }

        if (this.state === 'clear') {
            this.clearTimer -= dt;
            if (this.clearTimer <= 0) {
                this.level++;
                this.state = 'play';
                this.startLevel();
            }
            return;
        }

        if (this.state === 'transition') {
            this.transTimer -= dt;
            if (this.transTimer <= 0) {
                this.state = 'play';
            }
            return;
        }

        // play状态
        player.update(dt);
        updateProjectiles(dt);
        updateFloatingTexts(dt);

        // 当前层哥布林更新（两层都更新仇恨检测，但只有当前层的哥布林进行战斗）
        for (const g of this.goblinsL1) g.update(dt);
        for (const g of this.goblinsL2) g.update(dt);

        // 场景切换：一层右侧出境 → 二层左侧入场
        if (this.currentLayer === 1 && player.x > CANVAS_W + 20) {
            this.currentLayer = 2;
            player.x = 30;
            player.y = FLOOR_Y_2;
            player.grounded = true;
            player.vy = 0;
            projectiles.length = 0;
            this.state = 'transition';
            this.transTimer = 0.3;
        }

        // 二层左侧出境 → 返回一层右侧
        if (this.currentLayer === 2 && player.x < -20) {
            this.currentLayer = 1;
            player.x = CANVAS_W - 50;
            player.y = FLOOR_Y_1;
            player.grounded = true;
            player.vy = 0;
            projectiles.length = 0;
            this.state = 'transition';
            this.transTimer = 0.3;
        }

        // 二层右侧边界
        if (this.currentLayer === 2 && player.x > CANVAS_W - 30) {
            player.x = CANVAS_W - 30;
        }
    },

    draw(ctx) {
        ctx.fillStyle = '#0a0a0f';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

        if (this.state === 'title') {
            this.drawTitle(ctx);
            return;
        }

        // 地图背景
        if (this.mapImg) {
            ctx.drawImage(this.mapImg, 0, 0, CANVAS_W, CANVAS_H);
        }

        // 层级暗化
        if (this.currentLayer === 1) {
            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H / 2 - 10);
        } else {
            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            ctx.fillRect(0, CANVAS_H / 2 + 10, CANVAS_W, CANVAS_H / 2);
        }

        // 绘制当前层哥布林
        const goblins = this.getCurrentGoblins();
        for (const g of goblins) g.draw(ctx);

        // 绘制弹射物
        drawProjectiles(ctx);

        // 绘制玩家
        player.draw(ctx);

        // 伤害飘字
        drawFloatingTexts(ctx);

        // HUD
        this.drawHUD(ctx);

        // 过渡效果
        if (this.state === 'transition') {
            const alpha = this.transTimer / 0.3;
            ctx.fillStyle = `rgba(0,0,0,${alpha * 0.6})`;
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
        }

        // 通关提示
        if (this.state === 'clear') {
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            this.drawPixelText(ctx, '通关成功！进入下一关', CANVAS_W / 2, CANVAS_H / 2 - 10,
                '#ffd700', 24, 'center');
            this.drawPixelText(ctx, `第 ${this.level} 关完成`, CANVAS_W / 2, CANVAS_H / 2 + 25,
                '#aaa', 14, 'center');
        }

        // 游戏失败
        if (this.state === 'gameover') {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            this.drawPixelText(ctx, '你被击败了', CANVAS_W / 2, CANVAS_H / 2 - 15,
                '#cc3333', 26, 'center');
            if (this.gameoverTimer > 1.0 && Math.floor(Date.now() / 500) % 2 === 0) {
                this.drawPixelText(ctx, '按 空格 重新挑战', CANVAS_W / 2, CANVAS_H / 2 + 25,
                    '#888', 14, 'center');
            }
        }
    },

    drawTitle(ctx) {
        if (this.mapImg) {
            ctx.globalAlpha = 0.4;
            ctx.drawImage(this.mapImg, 0, 0, CANVAS_W, CANVAS_H);
            ctx.globalAlpha = 1;
        }
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

        this.drawPixelText(ctx, '像素地牢', CANVAS_W / 2, CANVAS_H / 2 - 60, '#e0c070', 36, 'center');
        this.drawPixelText(ctx, '法师清怪闯关', CANVAS_W / 2, CANVAS_H / 2 - 20, '#a0a0b0', 16, 'center');

        if (Math.floor(Date.now() / 600) % 2 === 0) {
            this.drawPixelText(ctx, '按 空格 开始游戏', CANVAS_W / 2, CANVAS_H / 2 + 40, '#8888aa', 14, 'center');
        }

        this.drawPixelText(ctx, '← → 移动　空格 跳跃　J/鼠标 攻击', CANVAS_W / 2, CANVAS_H / 2 + 80, '#555', 11, 'center');
        this.drawPixelText(ctx, '击杀所有哥布林通关', CANVAS_W / 2, CANVAS_H / 2 + 100, '#555', 11, 'center');
    },

    drawHUD(ctx) {
        if (this.state === 'clear' || this.state === 'gameover') return;

        // 玩家血条 — 像素风
        const barX = 16, barY = 16;
        const barW = 140, barH = 12;
        const hpRatio = player.hp / PLAYER_MAX_HP;

        // 底色
        ctx.fillStyle = '#1a0a0a';
        ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
        // 血量底色
        ctx.fillStyle = '#330000';
        ctx.fillRect(barX, barY, barW, barH);
        // 血量
        ctx.fillStyle = hpRatio > 0.5 ? '#cc2222' : hpRatio > 0.25 ? '#cc6622' : '#cc2222';
        ctx.fillRect(barX, barY, barW * hpRatio, barH);
        // 像素边框
        ctx.strokeStyle = '#884444';
        ctx.lineWidth = 1;
        ctx.strokeRect(barX - 2, barY - 2, barW + 4, barH + 4);
        // HP文字
        this.drawPixelText(ctx, `${player.hp}/${PLAYER_MAX_HP}`, barX + barW / 2, barY + barH / 2, '#fff', 10, 'center');

        // 关卡与层级
        const killed = [...this.goblinsL1, ...this.goblinsL2].filter(g => g.dead).length;
        const total = this.goblinsL1.length + this.goblinsL2.length;
        this.drawPixelText(ctx, `第 ${this.level} 关`, barX, barY + barH + 16, '#c0b080', 12, 'left');
        this.drawPixelText(ctx, `${killed}/${total}`, barX + 80, barY + barH + 16, '#cc6666', 12, 'left');

        const layerText = this.currentLayer === 1 ? '地牢下层' : '地牢上层';
        this.drawPixelText(ctx, layerText, CANVAS_W - 16, 26, 'rgba(200,200,220,0.5)', 12, 'right');
    },

    drawPixelText(ctx, text, x, y, color, size, align) {
        ctx.font = `bold ${size}px "Microsoft YaHei", sans-serif`;
        ctx.textAlign = align || 'left';
        ctx.textBaseline = 'middle';
        ctx.strokeStyle = 'rgba(0,0,0,0.7)';
        ctx.lineWidth = 3;
        ctx.strokeText(text, x, y);
        ctx.fillStyle = color;
        ctx.fillText(text, x, y);
    }
};

// ===== 主循环 =====
let lastTime = 0;

function loop(time) {
    requestAnimationFrame(loop);
    const dt = Math.min((time - lastTime) / 1000, 0.05);
    lastTime = time;

    // 清理justPressed
    game.update(dt);
    game.draw(ctx);

    // 清理justPressed在帧末
    for (const k in justPressed) justPressed[k] = false;
}

// ===== 启动 =====
loadAll().then(() => {
    document.getElementById('loading').style.display = 'none';
    game.init();
    requestAnimationFrame(loop);
});
</script>
