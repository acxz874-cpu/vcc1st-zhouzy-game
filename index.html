<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="screen-orientation" content="landscape">
<meta name="x5-orientation" content="landscape">
<meta name="x5-fullscreen" content="true">
<meta name="browsermode" content="application">
<meta name="full-screen" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>像素地牢 · 法师清怪</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background:#0a0a0f; display:flex; align-items:center; justify-content:center;
    height:100vh; width:100vw; font-family:'Microsoft YaHei',sans-serif; overflow:hidden;
    touch-action:none; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none;
}
@media screen and (orientation:portrait) {
    body {
        width:100vh; height:100vw;
        transform:rotate(90deg);
        transform-origin:top left;
        position:absolute; top:0; left:100vw;
    }
}
canvas {
    image-rendering:pixelated; image-rendering:crisp-edges;
    border:2px solid #2a2a3a; border-radius:4px;
    max-width:100%; max-height:100%;
}
#loading {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:#0a0a0f; display:flex; align-items:center; justify-content:center;
    flex-direction:column; z-index:100; color:#888; font-size:14px; letter-spacing:2px;
}
#loading .bar { width:200px; height:4px; background:#1a1a2a; border-radius:2px; margin-top:12px; }
#loading .fill { height:100%; background:#6b8cff; border-radius:2px; width:0%; transition:width 0.2s; }
#touch-controls { display:none; position:fixed; bottom:0; left:0; right:0; height:180px; z-index:50; pointer-events:none; }
.touch-group { position:absolute; bottom:16px; display:flex; gap:14px; pointer-events:auto; }
.touch-group.left { left:16px; align-items:center; }
.touch-group.right { right:16px; align-items:flex-end; }
.touch-btn {
    width:72px; height:72px; border-radius:50%;
    border:2.5px solid rgba(255,255,255,0.25);
    background:radial-gradient(circle at 40% 35%, rgba(255,255,255,0.15), rgba(255,255,255,0.03));
    color:rgba(255,255,255,0.6);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; font-weight:bold; line-height:1;
    -webkit-tap-highlight-color:transparent; touch-action:manipulation;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    transition: transform 0.05s;
}
.touch-btn.active { transform:scale(0.92); background:radial-gradient(circle at 40% 35%, rgba(255,255,255,0.3), rgba(255,255,255,0.08)); border-color:rgba(255,255,255,0.5); color:#fff; }
.touch-btn.btn-left, .touch-btn.btn-right { width:76px; height:76px; font-size:24px; }
.touch-btn.btn-jump { border-color:rgba(80,200,80,0.4); background:radial-gradient(circle at 40% 35%, rgba(80,200,80,0.2), rgba(80,200,80,0.05)); color:rgba(80,200,80,0.7); }
.touch-btn.btn-jump.active { border-color:rgba(80,200,80,0.7); background:radial-gradient(circle at 40% 35%, rgba(80,200,80,0.4), rgba(80,200,80,0.1)); color:#6f6; }
.touch-btn.btn-atk { border-color:rgba(100,150,255,0.4); background:radial-gradient(circle at 40% 35%, rgba(100,150,255,0.2), rgba(100,150,255,0.05)); color:rgba(100,150,255,0.7); }
.touch-btn.btn-atk.active { border-color:rgba(100,150,255,0.7); background:radial-gradient(circle at 40% 35%, rgba(100,150,255,0.4), rgba(100,150,255,0.1)); color:#8af; }
.touch-btn.btn-skill { border-color:rgba(200,100,255,0.4); background:radial-gradient(circle at 40% 35%, rgba(200,100,255,0.2), rgba(200,100,255,0.05)); color:rgba(200,100,255,0.7); }
.touch-btn.btn-skill.active { border-color:rgba(200,100,255,0.7); background:radial-gradient(circle at 40% 35%, rgba(200,100,255,0.4), rgba(200,100,255,0.1)); color:#c8f; }
</style>
</head>
<body>
<div id="loading">
    <div>加载素材中...</div>
    <div class="bar"><div class="fill" id="loadBar"></div></div>
</div>
<canvas id="game"></canvas>
<div id="touch-controls">
    <div class="touch-group left">
        <div class="touch-btn btn-left" data-key="ArrowLeft">◀</div>
        <div class="touch-btn btn-right" data-key="ArrowRight">▶</div>
    </div>
    <div class="touch-group right">
        <div class="touch-btn btn-skill" data-key="KeyK">技</div>
        <div class="touch-btn btn-atk" data-key="KeyJ">攻</div>
        <div class="touch-btn btn-jump" data-key="Space">跳</div>
    </div>
</div>
<script>
/* ================================================================
   2D复古像素RPG · 法师清怪闯关 v3 — BOSS战
   ================================================================ */

// ===== 常量 =====
const CANVAS_W = 960, CANVAS_H = 540;
const PLAYER_SPEED = 3;
const GOBLIN_SPEED = 1.2, GOBLIN_CHASE_SPEED = 1.5;
const SPRITE_SCALE = 0.18, GOBLIN_SCALE = 0.15, EFFECT_SCALE = 0.12;
const BOSS_SCALE = 0.207;  // 比法师大15%

// 精灵图底部空白补偿
const MAGE_FOOT_OFFSET = 82 * SPRITE_SCALE;
const GOBLIN_FOOT_OFFSET = 78 * GOBLIN_SCALE;
const BOSS_FOOT_OFFSET = 86 * BOSS_SCALE;  // move/dash 1000x1000, attack 1000x1300, 底部空白~86px

// 地面Y
const FLOOR_Y_1 = 471, FLOOR_Y_2 = 202;

// HP与伤害
const PLAYER_MAX_HP = 200;
const GOBLIN_MAX_HP = 75;
const PLAYER_DMG = 25, PLAYER_CRIT_DMG = 35, CRIT_CHANCE = 0.2;
const GOBLIN_DMG = 20;
const BOSS_MAX_HP = 300;
const BOSS_DASH_DMG = 40, BOSS_ATK_DMG = 10; // 两段各10，合计20

// 战斗参数
const AGGRO_RANGE = 200, GOBLIN_ATK_RANGE = 50;
const PROJECTILE_SPEED = 6, PROJECTILE_RANGE = 270;
const BOSS_MOVE_SPEED = 2, BOSS_DASH_SPEED = 8, BOSS_ATK_RANGE = 70;

// 跳跃
const JUMP_VELOCITY = -8, GRAVITY = 0.35;

// 断裂
const GAP_LEFT = 448, GAP_RIGHT = 520;

// ===== 资源加载 =====
const ASSET_VER = '11';
const assets = {};
const toLoad = [];
function regImg(key, src) { toLoad.push({ key, src: src + '?v=' + ASSET_VER }); }

// 法师
for (let i = 1; i <= 6; i++) regImg(`mage-idle-${i}`, `assets/sprites/mage-idle/${i}.png`);
for (let i = 1; i <= 6; i++) regImg(`mage-attack-${i}`, `assets/sprites/mage-attack/${i}.png`);
for (let i = 1; i <= 3; i++) regImg(`mage-move-${i}`, `assets/sprites/mage-move/${i}.png`);
for (let i = 1; i <= 4; i++) regImg(`mage-effect-${i}`, `assets/sprites/mage-effect/${i}.png`);
// 哥布林
for (let i = 1; i <= 3; i++) regImg(`goblin-move-${i}`, `assets/sprites/goblin-move/${i}.png`);
for (let i = 1; i <= 6; i++) regImg(`goblin-attack-${i}`, `assets/sprites/goblin-attack/${i}.png`);
for (let i = 1; i <= 4; i++) regImg(`goblin-death-${i}`, `assets/sprites/goblin-death/${i}.png`);
// 骷髅骑士BOSS
for (let i = 1; i <= 4; i++) regImg(`boss-move-${i}`, `assets/sprites/boss-move/${i}.png`);
for (let i = 1; i <= 9; i++) regImg(`boss-dash-${i}`, `assets/sprites/boss-dash/${i}.png`);
for (let i = 1; i <= 4; i++) regImg(`boss-attack-${i}`, `assets/sprites/boss-attack/${i}.png`);
// 法师技能
for (let i = 1; i <= 5; i++) regImg(`mage-skill-${i}`, `assets/sprites/mage-skill/${i}.png`);
// 地图
regImg('dungeon-1', 'assets/maps/dungeon-1.jpg');
regImg('dungeon-2', 'assets/maps/dungeon-2.jpg');

function loadAll() {
    return new Promise((resolve) => {
        let loaded = 0;
        const total = toLoad.length;
        const bar = document.getElementById('loadBar');
        const loadingText = document.querySelector('#loading div');
        function done() {
            loaded++;
            bar.style.width = (loaded / total * 100) + '%';
            loadingText.textContent = `加载素材中... (${loaded}/${total})`;
            if (loaded >= total) resolve();
        }
        for (const item of toLoad) {
            const img = new Image();
            img.onload = () => { assets[item.key] = img; done(); };
            img.onerror = () => { console.warn('Failed:', item.src); done(); };
            img.src = item.src;
        }
    });
}

// ===== 横屏 =====
try { if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(() => {}); } catch(e) {}

// ===== 输入 =====
const keys = {}, justPressed = {};
window.addEventListener('keydown', e => { if (!keys[e.code]) justPressed[e.code] = true; keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.code] = false; });
let mouseClicked = false;
window.addEventListener('mousedown', () => { mouseClicked = true; });
function consumeKey(code) { if (justPressed[code]) { justPressed[code] = false; return true; } return false; }

// ===== Canvas =====
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');
cvs.width = CANVAS_W; cvs.height = CANVAS_H;

// ===== 触控 =====
const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
if (isTouchDevice) document.getElementById('touch-controls').style.display = 'block';
document.querySelectorAll('.touch-btn').forEach(btn => {
    const kc = btn.dataset.key;
    btn.addEventListener('touchstart', e => { e.preventDefault(); btn.classList.add('active'); if (!keys[kc]) justPressed[kc] = true; keys[kc] = true; }, { passive: false });
    btn.addEventListener('touchend', e => { e.preventDefault(); btn.classList.remove('active'); keys[kc] = false; }, { passive: false });
    btn.addEventListener('touchcancel', () => { btn.classList.remove('active'); keys[kc] = false; });
});
cvs.addEventListener('touchstart', e => {
    e.preventDefault();
    if (game.state === 'title' || (game.state === 'gameover' && game.gameoverTimer > 1.0)) {
        justPressed['Space'] = true; keys['Space'] = true;
        setTimeout(() => { keys['Space'] = false; }, 100);
    }
}, { passive: false });

// ===== 精灵动画类 =====
class SpriteAnim {
    constructor(frames, fps = 8, loop = true) {
        this.frames = frames; this.fps = fps; this.loop = loop;
        this.idx = 0; this.timer = 0; this.done = false;
    }
    reset() { this.idx = 0; this.timer = 0; this.done = false; }
    update(dt) {
        if (this.done) return;
        this.timer += dt;
        if (this.timer >= 1 / this.fps) {
            this.timer -= 1 / this.fps;
            this.idx++;
            if (this.idx >= this.frames.length) {
                if (this.loop) this.idx = 0;
                else { this.idx = this.frames.length - 1; this.done = true; }
            }
        }
    }
    getFrame() { return this.frames[this.idx]; }
}

// ===== 伤害飘字 =====
const floatingTexts = [];
function addFloatingText(x, y, value, isCrit, color) { floatingTexts.push({ x, y, value, isCrit, color: color||null, life: 1.0, vy: -1.5 }); }
function updateFloatingTexts(dt) {
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const ft = floatingTexts[i]; ft.y += ft.vy; ft.life -= dt;
        if (ft.life <= 0) floatingTexts.splice(i, 1);
    }
}
function drawFloatingTexts(ctx) {
    for (const ft of floatingTexts) {
        const alpha = Math.min(1, ft.life * 2);
        const sz = ft.isCrit ? 18 : 14;
        const clr = ft.color ? ft.color.replace('1)', `${alpha})`) :
            (ft.isCrit ? `rgba(255,60,60,${alpha})` : `rgba(255,255,255,${alpha})`);
        ctx.font = `bold ${sz}px "Microsoft YaHei",sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.strokeStyle = `rgba(0,0,0,${alpha*0.8})`; ctx.lineWidth = 3;
        ctx.strokeText(ft.value, ft.x, ft.y);
        ctx.fillStyle = clr; ctx.fillText(ft.value, ft.x, ft.y);
    }
}

// ===== 弹射物 =====
const projectiles = [];
function spawnProjectile(x, y, dir) {
    projectiles.push({ x, y, dir, startX: x, alive: true,
        anim: new SpriteAnim(Array.from({length:4},(_,i)=>assets[`mage-effect-${i+1}`]),10), hitParticles: null });
}
function updateProjectiles(dt) {
    for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        if (!p.alive) {
            if (p.hitParticles) { p.hitParticles.life -= dt; if (p.hitParticles.life <= 0) projectiles.splice(i, 1); }
            else projectiles.splice(i, 1);
            continue;
        }
        p.x += PROJECTILE_SPEED * p.dir; p.anim.update(dt);
        if (Math.abs(p.x - p.startX) > PROJECTILE_RANGE || p.x < -20 || p.x > CANVAS_W + 20) { projectiles.splice(i, 1); continue; }

        // 命中哥布林（只检测同层）
        let hit = false;
        const goblins = game.currentLayer === 1 ? game.goblinsL1 : game.goblinsL2;
        for (const g of goblins) {
            if (g.dead || g.dying) continue;
            if (Math.abs(p.x - g.x) < 40) {
                p.alive = false; p.hitParticles = { x: p.x, y: p.y, life: 0.3 };
                const isCrit = Math.random() < CRIT_CHANCE;
                g.takeHit(isCrit ? PLAYER_CRIT_DMG : PLAYER_DMG, isCrit);
                hit = true; break;
            }
        }
        // 命中BOSS
        if (!hit && game.boss && game.boss.active && !game.boss.dead) {
            if (Math.abs(p.x - game.boss.x) < 60 && Math.abs(p.y - game.boss.y) < 80) {
                p.alive = false; p.hitParticles = { x: p.x, y: p.y, life: 0.3 };
                const isCrit = Math.random() < CRIT_CHANCE;
                game.boss.takeHit(isCrit ? PLAYER_CRIT_DMG : PLAYER_DMG, isCrit);
            }
        }
    }
}
function drawProjectiles(ctx) {
    for (const p of projectiles) {
        if (p.alive) {
            const f = p.anim.getFrame(); if (!f) continue;
            const w = f.width*EFFECT_SCALE, h = f.height*EFFECT_SCALE;
            ctx.save(); ctx.translate(p.x,p.y); if(p.dir===-1) ctx.scale(-1,1);
            ctx.drawImage(f,-w/2,-h/2,w,h); ctx.restore();
        } else if (p.hitParticles) {
            const hp = p.hitParticles, alpha = hp.life/0.3;
            ctx.save(); ctx.globalAlpha = alpha;
            for (let j=0;j<8;j++) {
                const a=(j/8)*Math.PI*2+(1-hp.life)*3, d=(1-hp.life/0.3)*25;
                const px=hp.x+Math.cos(a)*d, py=hp.y+Math.sin(a)*d, s=2+Math.random()*2;
                ctx.fillStyle=j%2===0?'#4fc3f7':'#0288d1';
                ctx.fillRect(px-s/2,py-s/2,s,s);
            }
            ctx.restore();
        }
    }
}

// ===== 法师技能（冰晶爆发） =====
const SKILL_DMG = 60, SKILL_COOLDOWN = 8, SKILL_RANGE = 120;
const SKILL_SCALE = 0.2;
const skillEffects = [];

function spawnSkillEffect(x, y, dir) {
    const ex = x + dir * 80;
    skillEffects.push({
        x: ex, y: y, alive: true, hit1Done: false, hit2Done: false,
        anim: new SpriteAnim(Array.from({length:5},(_,i)=>assets[`mage-skill-${i+1}`]),6,false)
    });
}

function updateSkillEffects(dt) {
    for (let i = skillEffects.length - 1; i >= 0; i--) {
        const s = skillEffects[i];
        s.anim.update(dt);

        // 收集范围内目标
        const targets = [];
        const goblins = game.currentLayer === 1 ? game.goblinsL1 : game.goblinsL2;
        for (const g of goblins) {
            if (!g.dead && !g.dying && Math.abs(s.x - g.x) < SKILL_RANGE) targets.push({type:'goblin', ref:g});
        }
        if (game.boss && game.boss.active && !game.boss.dead &&
            Math.abs(s.x - game.boss.x) < SKILL_RANGE && Math.abs(s.y - game.boss.y) < 100) {
            targets.push({type:'boss', ref:game.boss});
        }

        // 第3帧：第一段伤害30
        if (!s.hit1Done && s.anim.idx >= 2) {
            s.hit1Done = true;
            for (const t of targets) {
                t.ref.takeHit(30, false);
            }
        }

        // 第5帧：第二段伤害30 + 击飞 + 冰冻减速
        if (!s.hit2Done && s.anim.idx >= 4) {
            s.hit2Done = true;
            for (const t of targets) {
                t.ref.takeHit(30, false);
                // 击飞（给垂直速度，等同一段跳高度）
                if (t.type === 'goblin') {
                    // 哥布林没有vy系统，用floatingText模拟效果即可
                }
                if (t.type === 'boss' && t.ref.grounded) {
                    t.ref.grounded = false;
                    t.ref.vy = JUMP_VELOCITY;
                }
                // 冰冻减速
                if (t.type === 'boss') {
                    if (t.ref.rageUsed) {
                        addFloatingText(t.ref.x, t.ref.y - 180, '冰冻免疫', false, 'rgba(100,180,255,1)');
                    } else {
                        t.ref.frozenTimer = 3.0;
                    }
                } else {
                    t.ref.frozenTimer = 3.0;
                }
            }
        }

        if (s.anim.done) skillEffects.splice(i, 1);
    }
}

function drawSkillEffects(ctx) {
    for (const s of skillEffects) {
        const f = s.anim.getFrame(); if (!f) continue;
        const w = f.width * SKILL_SCALE, h = f.height * SKILL_SCALE;
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.drawImage(f, -w/2, -h + 79*SKILL_SCALE, w, h); // 底部空白补偿
        ctx.restore();
    }
}

// ===== 血瓶掉落系统 =====
const potions = [];
function spawnPotion(x, y) {
    potions.push({ x, y, life: 15.0, collected: false });
}
function updatePotions(dt) {
    for (let i = potions.length - 1; i >= 0; i--) {
        const p = potions[i];
        p.life -= dt;
        if (p.life <= 0) { potions.splice(i, 1); continue; }
        // 玩家碰触检测
        if (!p.collected && Math.abs(player.x - p.x) < 30 && Math.abs(player.y - p.y) < 30) {
            p.collected = true;
            player.hp = Math.min(player.hp + 20, PLAYER_MAX_HP);
            potions.splice(i, 1);
        }
    }
}
function drawPotions(ctx) {
    for (const p of potions) {
        // 最后2秒闪烁
        if (p.life < 2.0 && Math.floor(p.life * 6) % 2 === 0) continue;
        const px = p.x, py = p.y;
        // 像素风红色药瓶
        ctx.fillStyle = '#cc2222';
        ctx.fillRect(px - 5, py - 16, 10, 12);  // 瓶身
        ctx.fillStyle = '#aa1111';
        ctx.fillRect(px - 3, py - 20, 6, 4);    // 瓶口
        ctx.fillStyle = '#ffaaaa';
        ctx.fillRect(px - 3, py - 14, 3, 4);    // 高光
        ctx.fillStyle = '#882222';
        ctx.fillRect(px - 6, py - 5, 12, 2);    // 瓶底
    }
}

// ===== 玩家法师 =====
const player = {
    x:100, y:FLOOR_Y_1, vy:0, hp:PLAYER_MAX_HP,
    facing:1, state:'idle', grounded:true, falling:false,
    jumpCount:0, doubleJumping:false,
    skillCooldown:0, // 技能冷却
    anims:{}, currentAnim:null,
    attackHitChecked:false, idleCooldown:5.0, idlePlaying:false, hurtFlashTimer:0,

    init() {
        this.anims.idle = new SpriteAnim(Array.from({length:6},(_,i)=>assets[`mage-idle-${i+1}`]),6,false);
        this.anims.move = new SpriteAnim(Array.from({length:3},(_,i)=>assets[`mage-move-${i+1}`]),8);
        this.anims.attack = new SpriteAnim(Array.from({length:6},(_,i)=>assets[`mage-attack-${i+1}`]),10,false);
        this.anims.jump = new SpriteAnim(Array.from({length:3},(_,i)=>assets[`mage-move-${i+1}`]),6,false);
        this.currentAnim = this.anims.idle;
    },
    reset() {
        this.hp = PLAYER_MAX_HP; this.vy = 0; this.grounded = true; this.falling = false;
        this.jumpCount = 0; this.doubleJumping = false; this.skillCooldown = 0;
        this.state = 'idle'; this.hurtFlashTimer = 0; this.idleCooldown = 5.0; this.idlePlaying = false;
    },
    takeDamage(dmg) {
        this.hp -= dmg; this.hurtFlashTimer = 0.3;
        if (this.hp <= 0) { this.hp = 0; game.state = 'gameover'; game.gameoverTimer = 0; }
    },
    getFloorY() { return game.currentLayer === 1 ? FLOOR_Y_1 : FLOOR_Y_2; },
    isOverGap() {
        if (game.currentLayer !== 2 && !this.falling) return false;
        return this.x > GAP_LEFT && this.x < GAP_RIGHT;
    },
    update(dt) {
        if (game.state === 'gameover') return;
        if (this.hurtFlashTimer > 0) this.hurtFlashTimer -= dt;
        if (this.skillCooldown > 0) this.skillCooldown -= dt;

        if (this.state === 'attack' && this.anims.attack.done) {
            this.state = this.grounded ? 'idle' : 'jump';
            this.idleCooldown = 5.0; this.idlePlaying = false;
        }

        // 跌落（二层→一层）
        if (this.falling) {
            this.vy += GRAVITY; this.y += this.vy;
            if (this.y >= FLOOR_Y_1) {
                this.y = FLOOR_Y_1; this.vy = 0; this.grounded = true; this.falling = false;
                this.jumpCount = 0; this.doubleJumping = false; this.state = 'idle';
            }
            if (keys['ArrowLeft']||keys['KeyA']) { this.x -= PLAYER_SPEED*0.5; this.facing = -1; }
            if (keys['ArrowRight']||keys['KeyD']) { this.x += PLAYER_SPEED*0.5; this.facing = 1; }
            this.currentAnim = this.anims.jump; this.currentAnim.update(dt);
            if (this.x < 30) this.x = 30; mouseClicked = false; return;
        }

        const floorY = this.getFloorY();

        if (!this.grounded) {
            this.vy += GRAVITY; this.y += this.vy;
            // 落地检测
            if (this.y >= floorY) {
                if (game.currentLayer === 2 && this.isOverGap()) {
                    game.currentLayer = 1; this.falling = true; this.grounded = false;
                } else {
                    this.y = floorY; this.vy = 0; this.grounded = true;
                    this.jumpCount = 0; this.doubleJumping = false;
                    if (this.state === 'jump') this.state = 'idle';
                }
            }
        } else {
            if (game.currentLayer === 2 && this.isOverGap()) {
                game.currentLayer = 1; this.grounded = false; this.falling = true; this.vy = 0;
            }
        }

        // 输入
        if (this.state !== 'attack') {
            let moving = false;
            if (keys['ArrowLeft']||keys['KeyA']) { this.x -= PLAYER_SPEED; this.facing = -1; moving = true; }
            if (keys['ArrowRight']||keys['KeyD']) { this.x += PLAYER_SPEED; this.facing = 1; moving = true; }

            // 跳跃/二段跳
            if (consumeKey('Space')) {
                if (this.grounded) {
                    this.grounded = false; this.vy = JUMP_VELOCITY; this.state = 'jump';
                    this.jumpCount = 1; this.doubleJumping = false; this.anims.jump.reset();
                } else if (this.jumpCount === 1) {
                    // 二段跳
                    this.vy = JUMP_VELOCITY * 0.85; this.jumpCount = 2;
                    this.doubleJumping = true; this.anims.jump.reset();
                }
            }

            // 技能（K键）
            if (consumeKey('KeyK') && this.skillCooldown <= 0) {
                this.skillCooldown = SKILL_COOLDOWN;
                spawnSkillEffect(this.x, this.y, this.facing);
            }

            if (consumeKey('KeyJ') || mouseClicked) {
                mouseClicked = false; this.state = 'attack';
                this.currentAnim = this.anims.attack; this.currentAnim.reset(); this.attackHitChecked = false;
            } else if (this.grounded && this.state !== 'jump') {
                this.state = moving ? 'move' : 'idle';
            }
        }
        mouseClicked = false;

        // 动画
        if (this.state === 'idle') {
            if (!this.idlePlaying) {
                this.idleCooldown -= dt;
                if (this.idleCooldown <= 0) { this.idlePlaying = true; this.anims.idle.reset(); }
                this.currentAnim = this.anims.idle; this.anims.idle.idx = 0;
            } else {
                this.currentAnim = this.anims.idle; this.anims.idle.update(dt);
                if (this.anims.idle.done) { this.idlePlaying = false; this.idleCooldown = 5.0; }
            }
        } else if (this.state === 'move') { this.currentAnim = this.anims.move; this.currentAnim.update(dt); }
        else if (this.state === 'attack') { this.currentAnim.update(dt); }
        else if (this.state === 'jump') { this.currentAnim = this.anims.jump; this.currentAnim.update(dt); }

        // 发射弹射物
        if (this.state === 'attack' && !this.attackHitChecked && this.anims.attack.idx >= 4) {
            this.attackHitChecked = true;
            spawnProjectile(this.x + this.facing * 30, this.y - 60, this.facing);
        }

        if (this.x < 30) this.x = 30;
    },
    draw(ctx) {
        const frame = this.currentAnim ? this.currentAnim.getFrame() : null;
        if (!frame) return;
        if (this.hurtFlashTimer > 0 && Math.floor(this.hurtFlashTimer*15)%2===0) return;
        const w = frame.width*SPRITE_SCALE, h = frame.height*SPRITE_SCALE;
        ctx.save(); ctx.translate(this.x, this.y);
        if (this.facing === -1) ctx.scale(-1,1);
        ctx.drawImage(frame, -w/2, -h+MAGE_FOOT_OFFSET, w, h);
        ctx.restore();
    }
};

// ===== 哥布林 =====
class Goblin {
    constructor(x, y, patrolMin, patrolMax) {
        this.x = x; this.y = y; this.patrolMin = patrolMin; this.patrolMax = patrolMax;
        this.dir = 1; this.hp = GOBLIN_MAX_HP;
        this.dead = false; this.dying = false; this.inCombat = false;
        this.flashTimer = 0; this.atkCooldown = 0; this.isAttacking = false;
        this.frozenTimer = 0; // 冰冻减速
        this.anims = {
            move: new SpriteAnim(Array.from({length:3},(_,i)=>assets[`goblin-move-${i+1}`]),6),
            attack: new SpriteAnim(Array.from({length:6},(_,i)=>assets[`goblin-attack-${i+1}`]),8,false),
            death: new SpriteAnim(Array.from({length:4},(_,i)=>assets[`goblin-death-${i+1}`]),6,false),
        };
        this.currentAnim = this.anims.move;
    }
    takeHit(dmg, isCrit) {
        if (this.dead||this.dying) return;
        this.hp -= dmg; this.flashTimer = 1.0; this.inCombat = true;
        addFloatingText(this.x, this.y-100, dmg, isCrit);
        if (this.hp <= 0) {
            this.hp = 0; this.dying = true; this.isAttacking = false;
            this.currentAnim = this.anims.death; this.currentAnim.reset();
            // 30%概率掉落血瓶
            if (Math.random() < 0.3) spawnPotion(this.x, this.y);
            game.checkGoblinsCleared();
        }
    }
    update(dt) {
        if (this.dead) return;
        if (this.dying) { this.currentAnim.update(dt); if (this.currentAnim.done) this.dead = true; return; }
        if (this.flashTimer > 0) this.flashTimer -= dt;
        if (this.frozenTimer > 0) this.frozenTimer -= dt;
        const speedMult = this.frozenTimer > 0 ? 0.7 : 1.0; // 冰冻减速30%
        if (this.atkCooldown > 0) this.atkCooldown -= dt;
        const myLayer = this.y === FLOOR_Y_1 ? 1 : 2;
        const playerHere = game.currentLayer === myLayer;
        if (!playerHere) {
            if (this.isAttacking) { this.isAttacking = false; this.currentAnim = this.anims.move; this.currentAnim.reset(); }
            this.inCombat = false; this.atkCooldown = 0;
        }
        if (!this.inCombat && playerHere && Math.abs(player.x - this.x) < AGGRO_RANGE) this.inCombat = true;
        if (this.inCombat && playerHere) {
            const dx = player.x - this.x, dist = Math.abs(dx);
            if (this.isAttacking) {
                this.currentAnim.update(dt);
                if (this.anims.attack.idx >= 3 && !this._atkHit) {
                    this._atkHit = true;
                    if (Math.abs(player.x-this.x) < GOBLIN_ATK_RANGE+20) player.takeDamage(GOBLIN_DMG);
                }
                if (this.currentAnim.done) { this.isAttacking = false; this.atkCooldown = 1.0; this.currentAnim = this.anims.move; }
            } else if (dist < GOBLIN_ATK_RANGE && this.atkCooldown <= 0 && player.grounded) {
                this.isAttacking = true; this._atkHit = false; this.dir = dx>0?1:-1;
                this.currentAnim = this.anims.attack; this.currentAnim.reset();
            } else {
                this.dir = dx>0?1:-1; this.x += GOBLIN_CHASE_SPEED*speedMult*this.dir;
                if (this.y === FLOOR_Y_2 && this.x > GAP_LEFT-20 && this.x < GAP_RIGHT+20)
                    this.x = this.dir===1 ? GAP_LEFT-20 : GAP_RIGHT+20;
                this.currentAnim = this.anims.move; this.currentAnim.update(dt);
            }
        } else {
            this.x += GOBLIN_SPEED*speedMult*this.dir;
            if (this.x >= this.patrolMax) { this.x = this.patrolMax; this.dir = -1; }
            if (this.x <= this.patrolMin) { this.x = this.patrolMin; this.dir = 1; }
            this.currentAnim = this.anims.move; this.currentAnim.update(dt);
        }
    }
    draw(ctx) {
        if (this.dead) return;
        const frame = this.currentAnim.getFrame(); if (!frame) return;
        const w = frame.width*GOBLIN_SCALE, h = frame.height*GOBLIN_SCALE;
        ctx.save(); ctx.translate(this.x, this.y);
        if (this.dir === -1) ctx.scale(-1,1);
        if (this.flashTimer > 0 && Math.floor(this.flashTimer*8)%2===0) {
            const oc = document.createElement('canvas'); oc.width=Math.ceil(w); oc.height=Math.ceil(h);
            const ox = oc.getContext('2d'); ox.drawImage(frame,0,0,w,h);
            ox.globalCompositeOperation='source-atop'; ox.fillStyle='rgba(255,0,0,0.45)'; ox.fillRect(0,0,w,h);
            ctx.drawImage(oc,-w/2,-h+GOBLIN_FOOT_OFFSET);
        } else ctx.drawImage(frame,-w/2,-h+GOBLIN_FOOT_OFFSET,w,h);
        ctx.restore();
        if (this.inCombat && !this.dying) this.drawHPBar(ctx);
        // 冰冻减速：蓝色叠色 + 头顶减速图标
        if (this.frozenTimer > 0 && !this.dead && !this.dying) {
            // 蓝色叠色
            ctx.save(); ctx.translate(this.x, this.y);
            if (this.dir === -1) ctx.scale(-1,1);
            ctx.globalAlpha = 0.3;
            const fw = frame.width*GOBLIN_SCALE, fh = frame.height*GOBLIN_SCALE;
            const oc2 = document.createElement('canvas'); oc2.width=Math.ceil(fw); oc2.height=Math.ceil(fh);
            const ox2 = oc2.getContext('2d'); ox2.drawImage(frame,0,0,fw,fh);
            ox2.globalCompositeOperation='source-atop'; ox2.fillStyle='#4488ff'; ox2.fillRect(0,0,fw,fh);
            ctx.drawImage(oc2,-fw/2,-fh+GOBLIN_FOOT_OFFSET);
            ctx.restore();
            // 头顶减速图标
            ctx.save();
            ctx.font = 'bold 12px "Microsoft YaHei"'; ctx.textAlign = 'center';
            ctx.fillStyle = '#66bbff'; ctx.fillText('❄', this.x, this.y - 120);
            ctx.restore();
        }
    }
    drawHPBar(ctx) {
        const bW=40,bH=5,bx=this.x-bW/2,by=this.y-110,r=this.hp/GOBLIN_MAX_HP;
        ctx.fillStyle='#1a1a1a'; ctx.fillRect(bx-1,by-1,bW+2,bH+2);
        ctx.fillStyle=r>0.5?'#44cc44':r>0.25?'#cccc44':'#cc4444'; ctx.fillRect(bx,by,bW*r,bH);
        ctx.strokeStyle='#666'; ctx.lineWidth=1; ctx.strokeRect(bx-1,by-1,bW+2,bH+2);
    }
}

// ===== 骷髅骑士BOSS =====
class SkeletonKnight {
    constructor() {
        this.x = 0; this.y = 0; this.dir = -1; this.hp = BOSS_MAX_HP;
        this.active = false; this.dead = false; this.dying = false;
        this.state = 'idle'; // idle|move|dash|attack|dying
        this.vy = 0; this.grounded = true; this.falling = false;
        this.flashTimer = 0; this.atkCooldown = 2.0; this.dashCooldown = 5.0;
        this._atkHit1 = false; this._atkHit2 = false;
        this.dashStartX = 0;
        // 追击节奏：追几秒→停几秒→再追
        this.chaseTimer = 3.0;   // 追击持续时间
        this.pauseTimer = 0;     // 停顿计时
        this.pausing = false;
        this.frozenTimer = 0; // 冰冻减速
        // 狂暴模式
        this.rageUsed = false;
        this.ragePhase = 'none'; // none|warning|dashing
        this.rageDashCount = 0;
        this.rageDashDelay = 0;
        this.rageWarningTimer = 0;
        this.anims = {};
        this.currentAnim = null;
    }
    init() {
        this.anims.move = new SpriteAnim(Array.from({length:4},(_,i)=>assets[`boss-move-${i+1}`]),6);
        this.anims.dash = new SpriteAnim(Array.from({length:9},(_,i)=>assets[`boss-dash-${i+1}`]),12);
        this.anims.attack = new SpriteAnim(Array.from({length:4},(_,i)=>assets[`boss-attack-${i+1}`]),5,false);
        this.currentAnim = this.anims.move;
    }
    spawn(layer) {
        this.active = true; this.dead = false; this.dying = false; this.hp = BOSS_MAX_HP;
        this.y = layer === 1 ? FLOOR_Y_1 : FLOOR_Y_2;
        this.x = CANVAS_W + 80; this.dir = -1;
        this.grounded = true; this.falling = false; this.vy = 0;
        // 以冲刺入场
        this.state = 'dash'; this.dashStartX = this.x;
        this.currentAnim = this.anims.dash; this.currentAnim.reset();
        this.atkCooldown = 2.0; this.dashCooldown = 6.0;
        this.chaseTimer = 3.0; this.pauseTimer = 0; this.pausing = false;
        this.frozenTimer = 0;
        this.rageUsed = false; this.ragePhase = 'none'; this.rageDashCount = 0;
    }
    takeHit(dmg, isCrit) {
        if (this.dead || this.dying) return;
        // 狂暴状态免伤30%
        if (this.rageUsed) dmg = Math.round(dmg * 0.7);
        this.hp -= dmg; this.flashTimer = 0.5;
        addFloatingText(this.x, this.y - 160, dmg, isCrit);
        if (this.hp <= 0) {
            this.hp = 0; this.dying = true; this.state = 'dying';
            // 用move动画最后一帧表示死亡（无专属死亡帧）
        }
    }
    isOverGap() {
        const layer = this.y <= FLOOR_Y_2 + 50 ? 2 : 1;
        if (layer !== 2) return false;
        return this.x > GAP_LEFT && this.x < GAP_RIGHT;
    }
    update(dt) {
        if (!this.active || this.dead) return;
        if (this.flashTimer > 0) this.flashTimer -= dt;

        // 死亡处理
        if (this.dying) {
            this.flashTimer = 999; // 持续闪烁
            this.dying = false; this.dead = true; this.active = false;
            game.onBossKilled();
            return;
        }

        // 重力/跌落
        if (this.falling) {
            this.vy += GRAVITY; this.y += this.vy;
            if (this.y >= FLOOR_Y_1) {
                this.y = FLOOR_Y_1; this.vy = 0; this.grounded = true; this.falling = false;
            }
            return;
        }
        if (!this.grounded) {
            this.vy += GRAVITY; this.y += this.vy;
            const floorY = this.y <= FLOOR_Y_2+50 ? FLOOR_Y_2 : FLOOR_Y_1;
            if (this.y >= floorY) { this.y = floorY; this.vy = 0; this.grounded = true; }
        }
        // 地面断裂检测
        const bossLayer = this.y <= FLOOR_Y_2 + 50 ? 2 : 1;
        if (this.grounded && bossLayer === 2 && this.x > GAP_LEFT && this.x < GAP_RIGHT) {
            this.grounded = false; this.falling = true; this.vy = 0;
        }

        // 冷却
        if (this.atkCooldown > 0) this.atkCooldown -= dt;
        if (this.dashCooldown > 0) this.dashCooldown -= dt;
        if (this.frozenTimer > 0) this.frozenTimer -= dt;
        const bossSpeedMult = this.frozenTimer > 0 ? 0.7 : 1.0;

        // 狂暴模式：血量<50%时触发
        if (!this.rageUsed && this.hp <= BOSS_MAX_HP * 0.5 && this.hp > 0) {
            this.rageUsed = true;
            this.ragePhase = 'warning';
            this.rageWarningTimer = 1.5;
            this.state = 'move'; // 暂停当前动作
        }
        if (this.ragePhase === 'warning') {
            this.rageWarningTimer -= dt;
            this.currentAnim = this.anims.move; this.currentAnim.update(dt);
            if (this.rageWarningTimer <= 0) {
                this.ragePhase = 'dashing';
                this.rageDashCount = 0;
                this.rageDashDelay = 0;
            }
            return; // 警告期间不执行其他逻辑
        }
        if (this.ragePhase === 'dashing') {
            if (this.state !== 'dash' && this.state !== 'retreat') {
                this.rageDashDelay -= dt;
                if (this.rageDashDelay <= 0 && this.rageDashCount < 3) {
                    this.rageDashCount++;
                    this._dashHitDone = false;
                    const rdx = player.x - this.x;
                    if (Math.abs(rdx) >= 250) {
                        this.state = 'dash'; this.dashStartX = this.x;
                        this.dir = rdx > 0 ? 1 : -1;
                        this.currentAnim = this.anims.dash; this.currentAnim.reset();
                    } else {
                        this.state = 'retreat';
                    }
                }
                if (this.rageDashCount >= 3 && this.state !== 'dash' && this.state !== 'retreat') {
                    this.ragePhase = 'none'; this.dashCooldown = 5.0;
                }
                // 等待间隔期间播放移动动画，不执行后续逻辑
                if (this.state !== 'dash' && this.state !== 'retreat') {
                    this.currentAnim = this.anims.move; this.currentAnim.update(dt);
                    return;
                }
            }
        }

        const dx = player.x - this.x;
        const dist = Math.abs(dx);
        const playerJumping = !player.grounded;
        // 冲刺中不改变方向（直线移动），距离太近时保持原方向不翻转
        if (this.state !== 'dash' && Math.abs(dx) > 15) this.dir = dx > 0 ? 1 : -1;

        const DASH_DIST = CANVAS_W * 0.5; // 冲刺固定半个地图宽度
        const DASH_MIN_RANGE = 250; // BOSS需要离玩家至少250px才会冲刺

        if (this.state === 'dash') {
            // 冲刺移动（固定距离，不因命中停止）
            this.x += BOSS_DASH_SPEED * this.dir;
            this.currentAnim = this.anims.dash; this.currentAnim.update(dt);
            // 冲刺途中伤害判定（可多次检测但只命中一次）
            if (dist < 50 && !player.doubleJumping && !this._dashHitDone && bossLayer === game.currentLayer) {
                this._dashHitDone = true;
                player.takeDamage(BOSS_DASH_DMG);
            }
            // 冲刺结束：固定距离或到边界
            if (Math.abs(this.x - this.dashStartX) >= DASH_DIST || this.x <= 30 || this.x >= CANVAS_W - 30) {
                this.state = 'move';
                if (this.ragePhase === 'dashing') this.rageDashDelay = 0.5;
                else this.dashCooldown = 5.0;
                this.currentAnim = this.anims.move;
            }
            if (this.x < 30) this.x = 30;
            if (this.x > CANVAS_W - 30) this.x = CANVAS_W - 30;

        } else if (this.state === 'attack') {
            this.currentAnim.update(dt);
            // 两段攻击判定
            if (this.anims.attack.idx >= 1 && !this._atkHit1) {
                this._atkHit1 = true;
                if (dist < BOSS_ATK_RANGE && !playerJumping && bossLayer === game.currentLayer) player.takeDamage(BOSS_ATK_DMG);
            }
            if (this.anims.attack.idx >= 3 && !this._atkHit2) {
                this._atkHit2 = true;
                if (dist < BOSS_ATK_RANGE && !playerJumping && bossLayer === game.currentLayer) player.takeDamage(BOSS_ATK_DMG);
            }
            if (this.currentAnim.done) {
                this.state = 'move'; this.atkCooldown = 2.0;
                this.currentAnim = this.anims.move;
            }

        } else if (this.state === 'retreat') {
            // 远离玩家再冲刺
            const awayDir = dx > 0 ? -1 : 1;
            this.x += BOSS_MOVE_SPEED * 1.5 * bossSpeedMult * awayDir;
            this.currentAnim = this.anims.move; this.currentAnim.update(dt);
            if (dist >= DASH_MIN_RANGE || this.x <= 30 || this.x >= CANVAS_W - 30) {
                // 足够远了，发动冲刺
                this.state = 'dash'; this.dashStartX = this.x; this._dashHitDone = false;
                this.dir = dx > 0 ? 1 : -1;
                this.currentAnim = this.anims.dash; this.currentAnim.reset();
            }
            if (this.x < 30) this.x = 30;
            if (this.x > CANVAS_W - 30) this.x = CANVAS_W - 30;

        } else {
            // move：追击玩家
            const playerLayer = game.currentLayer;
            if (bossLayer !== playerLayer) {
                // 跨层追击：走向出口
                if (bossLayer === 1) {
                    // 一层走向右侧出口
                    this.x += BOSS_MOVE_SPEED * bossSpeedMult;
                    if (this.x > CANVAS_W + 20) {
                        this.y = FLOOR_Y_2; this.x = 30; this.grounded = true; this.falling = false;
                    }
                } else {
                    // 二层走向左侧出口
                    this.x -= BOSS_MOVE_SPEED * bossSpeedMult;
                    if (this.x < -20) {
                        this.y = FLOOR_Y_1; this.x = CANVAS_W - 50; this.grounded = true; this.falling = false;
                    }
                }
                this.currentAnim = this.anims.move; this.currentAnim.update(dt);
            } else {
                // 追击-停顿节奏
                if (this.pausing) {
                    // 停顿中：原地播放移动动画，不追击
                    this.pauseTimer -= dt;
                    this.currentAnim = this.anims.move; this.currentAnim.update(dt);
                    if (this.pauseTimer <= 0) {
                        this.pausing = false;
                        this.chaseTimer = 2.5 + Math.random() * 2; // 下次追击2.5~4.5秒
                    }
                    // 停顿期间仍可释放冲刺技能
                    if (this.dashCooldown <= 0 && Math.random() < 0.15) {
                        this.pausing = false;
                        if (dist >= DASH_MIN_RANGE) {
                            this.state = 'dash'; this.dashStartX = this.x; this._dashHitDone = false;
                            this.currentAnim = this.anims.dash; this.currentAnim.reset();
                        } else {
                            this.state = 'retreat';
                        }
                    }
                } else {
                    // 追击中
                    this.chaseTimer -= dt;
                    this.x += BOSS_MOVE_SPEED * bossSpeedMult * this.dir;
                    // 追击时间到 → 进入停顿
                    if (this.chaseTimer <= 0) {
                        this.pausing = true;
                        this.pauseTimer = 1.5 + Math.random() * 1.5; // 停顿1.5~3秒
                    }
                    // 决定释放技能（玩家跳跃中不发动攻击）
                    if (!playerJumping && dist < BOSS_ATK_RANGE && this.atkCooldown <= 0) {
                        this.state = 'attack'; this._atkHit1 = false; this._atkHit2 = false;
                        this.currentAnim = this.anims.attack; this.currentAnim.reset();
                    } else if (this.dashCooldown <= 0 && Math.random() < 0.15) {
                        if (dist >= DASH_MIN_RANGE) {
                            this.state = 'dash'; this.dashStartX = this.x; this._dashHitDone = false;
                            this.currentAnim = this.anims.dash; this.currentAnim.reset();
                        } else {
                            this.state = 'retreat';
                        }
                    } else {
                        this.currentAnim = this.anims.move; this.currentAnim.update(dt);
                    }
                }
            }
            if (this.x < 30) this.x = 30;
            if (this.x > CANVAS_W - 30) this.x = CANVAS_W - 30;
        }
    }
    draw(ctx) {
        if (!this.active || this.dead) return;
        const frame = this.currentAnim ? this.currentAnim.getFrame() : null;
        if (!frame) return;
        const w = frame.width * BOSS_SCALE, h = frame.height * BOSS_SCALE;
        ctx.save(); ctx.translate(this.x, this.y);
        if (this.dir === -1) ctx.scale(-1, 1);
        // 受击闪烁
        if (this.flashTimer > 0 && Math.floor(this.flashTimer*8)%2===0) {
            const oc = document.createElement('canvas'); oc.width=Math.ceil(w); oc.height=Math.ceil(h);
            const ox = oc.getContext('2d'); ox.drawImage(frame,0,0,w,h);
            ox.globalCompositeOperation='source-atop'; ox.fillStyle='rgba(255,0,0,0.45)'; ox.fillRect(0,0,w,h);
            ctx.drawImage(oc,-w/2,-h+BOSS_FOOT_OFFSET);
        } else {
            ctx.drawImage(frame,-w/2,-h+BOSS_FOOT_OFFSET,w,h);
        }
        ctx.restore();
        // BOSS冰冻效果
        if (this.frozenTimer > 0) {
            ctx.save(); ctx.translate(this.x, this.y);
            if (this.dir === -1) ctx.scale(-1,1);
            ctx.globalAlpha = 0.25;
            const fw2 = frame.width*BOSS_SCALE, fh2 = frame.height*BOSS_SCALE;
            const oc3 = document.createElement('canvas'); oc3.width=Math.ceil(fw2); oc3.height=Math.ceil(fh2);
            const ox3 = oc3.getContext('2d'); ox3.drawImage(frame,0,0,fw2,fh2);
            ox3.globalCompositeOperation='source-atop'; ox3.fillStyle='#4488ff'; ox3.fillRect(0,0,fw2,fh2);
            ctx.drawImage(oc3,-fw2/2,-fh2+BOSS_FOOT_OFFSET);
            ctx.restore();
            ctx.save(); ctx.font='bold 16px "Microsoft YaHei"'; ctx.textAlign='center';
            ctx.fillStyle='#66bbff'; ctx.fillText('❄', this.x, this.y - 200);
            ctx.restore();
        }
        // BOSS血条
        this.drawHPBar(ctx);
    }
    drawHPBar(ctx) {
        // 画面顶部巨大像素风BOSS血条
        const bW=400, bH=16, bx=CANVAS_W/2-bW/2, by=12, r=this.hp/BOSS_MAX_HP;
        // 外框
        ctx.fillStyle='#0a0a0a'; ctx.fillRect(bx-3,by-3,bW+6,bH+6);
        // 底色
        ctx.fillStyle='#2a0000'; ctx.fillRect(bx,by,bW,bH);
        // 血量
        const hpColor = r > 0.5 ? '#cc2222' : r > 0.25 ? '#dd4400' : '#ff0000';
        ctx.fillStyle=hpColor; ctx.fillRect(bx,by,bW*r,bH);
        // 像素格纹理
        ctx.fillStyle='rgba(255,255,255,0.08)';
        for (let i = 0; i < bW * r; i += 4) ctx.fillRect(bx + i, by, 2, bH);
        // 边框
        ctx.strokeStyle='#cc4444'; ctx.lineWidth=2; ctx.strokeRect(bx-3,by-3,bW+6,bH+6);
        ctx.strokeStyle='#661111'; ctx.lineWidth=1; ctx.strokeRect(bx-1,by-1,bW+2,bH+2);
        // 标题
        game.drawPixelText(ctx, '骷髅骑士', bx+bW/2, by+bH+14, '#ff6666', 12, 'center');
        // HP数值
        game.drawPixelText(ctx, `${this.hp}/${BOSS_MAX_HP}`, bx+bW/2, by+bH/2, '#fff', 10, 'center');
    }
}

// ===== 游戏主控 =====
const game = {
    state: 'title', currentLayer: 1, level: 1,
    goblinsL1: [], goblinsL2: [],
    boss: null, bossPhase: 'inactive', // inactive|shaking|entering|fighting
    shakeTimer: 0, shakeIntensity: 0,
    clearTimer: 0, gameoverTimer: 0, mapImg: null, mapImg2: null,
    sceneTransition: 0, // 0=地牢1, 1=地牢2, 渐变中间值
    fallingDebris: [], // 落石/砂砾粒子

    init() {
        this.mapImg = assets['dungeon-1'];
        this.mapImg2 = assets['dungeon-2'];
        player.init();
        this.boss = new SkeletonKnight();
        this.boss.init();
        this.startLevel();
    },
    startLevel() {
        this.currentLayer = 1;
        player.x = 100; player.y = FLOOR_Y_1; player.reset();
        player.facing = 1; player.currentAnim = player.anims.idle;
        projectiles.length = 0; floatingTexts.length = 0; potions.length = 0;
        this.bossPhase = 'inactive'; this.shakeTimer = 0;
        this.sceneTransition = 0; this.fallingDebris = [];
        this.boss.active = false; this.boss.dead = false; this.boss.dying = false;
        // 一层3只哥布林
        this.goblinsL1 = [
            new Goblin(250, FLOOR_Y_1, 100, 400),
            new Goblin(500, FLOOR_Y_1, 300, 650),
            new Goblin(780, FLOOR_Y_1, 600, 920),
        ];
        // 二层2只哥布林
        this.goblinsL2 = [
            new Goblin(250, FLOOR_Y_2, 80, GAP_LEFT - 20),
            new Goblin(700, FLOOR_Y_2, GAP_RIGHT + 20, 880),
        ];
    },
    getCurrentGoblins() { return this.currentLayer === 1 ? this.goblinsL1 : this.goblinsL2; },

    checkGoblinsCleared() {
        const allDead = [...this.goblinsL1, ...this.goblinsL2].every(g => g.dead || g.dying);
        if (allDead && this.bossPhase === 'inactive') {
            // 开始BOSS出场流程
            this.bossPhase = 'shaking';
            this.shakeTimer = 3.0;
            this.shakeIntensity = 6;
        }
    },
    onBossKilled() {
        this.state = 'clear'; this.clearTimer = 2.5;
    },

    update(dt) {
        if (this.state === 'title') {
            if (consumeKey('Space')||consumeKey('Enter')||mouseClicked) { mouseClicked=false; this.state='play'; }
            return;
        }
        if (this.state === 'gameover') {
            this.gameoverTimer += dt;
            if (this.gameoverTimer>1.0 && (consumeKey('Space')||consumeKey('Enter')||mouseClicked)) {
                mouseClicked=false; this.state='play'; this.startLevel();
            }
            return;
        }
        if (this.state === 'clear') {
            this.clearTimer -= dt;
            if (this.clearTimer <= 0) { this.level++; this.state='play'; this.startLevel(); }
            return;
        }

        // 震荡阶段
        if (this.bossPhase === 'shaking') {
            this.shakeTimer -= dt;
            // 场景从地牢1渐变到地牢2（3秒内完成）
            this.sceneTransition = Math.min(1, this.sceneTransition + dt / 3.0);
            // 生成落石/砂砾粒子
            for (let k = 0; k < 3; k++) {
                if (Math.random() < 0.4) {
                    const isRock = Math.random() < 0.3;
                    this.fallingDebris.push({
                        x: Math.random() * CANVAS_W,
                        y: -10 - Math.random() * 30,
                        vy: 1 + Math.random() * 3,
                        vx: (Math.random() - 0.5) * 0.5,
                        size: isRock ? (4 + Math.random() * 8) : (1 + Math.random() * 3),
                        color: isRock ? '#665544' : '#998877',
                        rot: Math.random() * Math.PI * 2,
                        rotSpeed: (Math.random() - 0.5) * 3,
                    });
                }
            }
            if (this.shakeTimer <= 0) {
                this.bossPhase = 'fighting';
                this.sceneTransition = 1;
                this.boss.spawn(1);
            }
        }
        // 更新落石粒子
        for (let i = this.fallingDebris.length - 1; i >= 0; i--) {
            const d = this.fallingDebris[i];
            d.y += d.vy; d.x += d.vx; d.vy += 0.15; d.rot += d.rotSpeed * 0.016;
            if (d.y > CANVAS_H + 20) this.fallingDebris.splice(i, 1);
        }

        player.update(dt);
        updateProjectiles(dt);
        updateFloatingTexts(dt);
        updatePotions(dt);
        updateSkillEffects(dt);
        for (const g of this.goblinsL1) g.update(dt);
        for (const g of this.goblinsL2) g.update(dt);
        if (this.boss.active) this.boss.update(dt);

        // 场景切换
        if (this.currentLayer===1 && player.x > CANVAS_W+20) {
            this.currentLayer=2; player.x=30; player.y=FLOOR_Y_2;
            player.grounded=true; player.vy=0; player.jumpCount=0; player.doubleJumping=false;
            projectiles.length=0;
        }
        if (this.currentLayer===2 && player.x < -20) {
            this.currentLayer=1; player.x=CANVAS_W-50; player.y=FLOOR_Y_1;
            player.grounded=true; player.vy=0; player.jumpCount=0; player.doubleJumping=false;
            projectiles.length=0;
        }
        if (this.currentLayer===2 && player.x > CANVAS_W-30) player.x=CANVAS_W-30;
    },

    draw(ctx) {
        // 震荡偏移
        let sx=0, sy=0;
        if (this.bossPhase==='shaking') {
            sx = (Math.random()-0.5)*this.shakeIntensity*2;
            sy = (Math.random()-0.5)*this.shakeIntensity*2;
        }

        ctx.save();
        ctx.translate(sx, sy);

        ctx.fillStyle='#0a0a0f'; ctx.fillRect(-10,-10,CANVAS_W+20,CANVAS_H+20);

        if (this.state==='title') { this.drawTitle(ctx); ctx.restore(); return; }

        // 场景渐变绘制
        if (this.sceneTransition <= 0) {
            if (this.mapImg) ctx.drawImage(this.mapImg,0,0,CANVAS_W,CANVAS_H);
        } else if (this.sceneTransition >= 1) {
            if (this.mapImg2) ctx.drawImage(this.mapImg2,0,0,CANVAS_W,CANVAS_H);
        } else {
            // 渐变混合
            if (this.mapImg) ctx.drawImage(this.mapImg,0,0,CANVAS_W,CANVAS_H);
            if (this.mapImg2) {
                ctx.globalAlpha = this.sceneTransition;
                ctx.drawImage(this.mapImg2,0,0,CANVAS_W,CANVAS_H);
                ctx.globalAlpha = 1;
            }
        }

        // 落石/砂砾粒子
        for (const d of this.fallingDebris) {
            ctx.save();
            ctx.translate(d.x, d.y);
            ctx.rotate(d.rot);
            ctx.fillStyle = d.color;
            const hs = d.size / 2;
            if (d.size > 5) {
                // 石块：不规则多边形
                ctx.beginPath();
                ctx.moveTo(-hs, -hs*0.6);
                ctx.lineTo(hs*0.4, -hs);
                ctx.lineTo(hs, hs*0.3);
                ctx.lineTo(hs*0.2, hs);
                ctx.lineTo(-hs*0.7, hs*0.6);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#44332a'; ctx.lineWidth = 0.5; ctx.stroke();
            } else {
                // 砂砾：小方块
                ctx.fillRect(-hs, -hs, d.size, d.size);
            }
            ctx.restore();
        }

        for (const g of this.goblinsL1) g.draw(ctx);
        for (const g of this.goblinsL2) g.draw(ctx);
        if (this.boss.active) this.boss.draw(ctx);
        drawProjectiles(ctx);
        player.draw(ctx);
        drawFloatingTexts(ctx);
        drawPotions(ctx);
        drawSkillEffects(ctx);
        this.drawHUD(ctx);

        // 震荡红色警告
        if (this.bossPhase==='shaking') {
            // 红色闪烁全屏
            const rAlpha = 0.15 + 0.1 * Math.sin(Date.now() * 0.01);
            ctx.fillStyle=`rgba(180,0,0,${rAlpha})`; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
            ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
            // 屏幕边缘红色渐变
            const grd = ctx.createRadialGradient(CANVAS_W/2,CANVAS_H/2,100,CANVAS_W/2,CANVAS_H/2,CANVAS_W/2);
            grd.addColorStop(0,'rgba(0,0,0,0)'); grd.addColorStop(1,'rgba(150,0,0,0.4)');
            ctx.fillStyle=grd; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
            if (Math.floor(Date.now()/400)%2===0)
                this.drawPixelText(ctx,'! 警 告 !',CANVAS_W/2,CANVAS_H/2-20,'#ff2222',32,'center');
            this.drawPixelText(ctx,'强大的敌人正在靠近...',CANVAS_W/2,CANVAS_H/2+20,'#cc8888',14,'center');
        }

        // BOSS狂暴红色警告
        if (this.boss && this.boss.active && this.boss.ragePhase === 'warning') {
            const rAlpha = 0.12 + 0.08 * Math.sin(Date.now() * 0.015);
            ctx.fillStyle=`rgba(200,0,0,${rAlpha})`; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
            if (Math.floor(Date.now()/250)%2===0)
                this.drawPixelText(ctx,'! 狂 暴 !',CANVAS_W/2,CANVAS_H/2,'#ff0000',30,'center');
        }

        if (this.state==='clear') {
            ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
            this.drawPixelText(ctx,'通关成功！',CANVAS_W/2,CANVAS_H/2-10,'#ffd700',24,'center');
            this.drawPixelText(ctx,`第 ${this.level} 关完成`,CANVAS_W/2,CANVAS_H/2+25,'#aaa',14,'center');
        }
        if (this.state==='gameover') {
            ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
            this.drawPixelText(ctx,'你被击败了',CANVAS_W/2,CANVAS_H/2-15,'#cc3333',26,'center');
            if (this.gameoverTimer>1.0 && Math.floor(Date.now()/500)%2===0)
                this.drawPixelText(ctx,isTouchDevice?'点击屏幕重新挑战':'按 空格 重新挑战',CANVAS_W/2,CANVAS_H/2+25,'#888',14,'center');
        }

        ctx.restore();
    },

    drawTitle(ctx) {
        if (this.mapImg) { ctx.globalAlpha=0.4; ctx.drawImage(this.mapImg,0,0,CANVAS_W,CANVAS_H); ctx.globalAlpha=1; }
        ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
        this.drawPixelText(ctx,'像素地牢',CANVAS_W/2,CANVAS_H/2-60,'#e0c070',36,'center');
        this.drawPixelText(ctx,'法师闯关 · BOSS战',CANVAS_W/2,CANVAS_H/2-20,'#a0a0b0',16,'center');
        if (Math.floor(Date.now()/600)%2===0)
            this.drawPixelText(ctx,isTouchDevice?'点击屏幕开始':'按 空格 开始游戏',CANVAS_W/2,CANVAS_H/2+40,'#8888aa',14,'center');
        this.drawPixelText(ctx,isTouchDevice?'左侧方向移动　右侧跳跃/攻击/技能':'← → 移动　空格 跳跃　J攻击　K技能',CANVAS_W/2,CANVAS_H/2+80,'#555',11,'center');
        this.drawPixelText(ctx,'清除哥布林 → 击败骷髅骑士BOSS通关',CANVAS_W/2,CANVAS_H/2+100,'#555',11,'center');
    },

    drawHUD(ctx) {
        if (this.state==='clear'||this.state==='gameover') return;
        const bx=16,by=16,bW=160,bH=12,r=player.hp/PLAYER_MAX_HP;
        ctx.fillStyle='#1a0a0a'; ctx.fillRect(bx-2,by-2,bW+4,bH+4);
        ctx.fillStyle='#330000'; ctx.fillRect(bx,by,bW,bH);
        ctx.fillStyle=r>0.5?'#cc2222':r>0.25?'#cc6622':'#cc2222'; ctx.fillRect(bx,by,bW*r,bH);
        ctx.strokeStyle='#884444'; ctx.lineWidth=1; ctx.strokeRect(bx-2,by-2,bW+4,bH+4);
        this.drawPixelText(ctx,`${player.hp}/${PLAYER_MAX_HP}`,bx+bW/2,by+bH/2,'#fff',10,'center');

        const killed=[...this.goblinsL1,...this.goblinsL2].filter(g=>g.dead).length;
        const total=this.goblinsL1.length+this.goblinsL2.length;
        this.drawPixelText(ctx,`第 ${this.level} 关`,bx,by+bH+16,'#c0b080',12,'left');
        this.drawPixelText(ctx,`哥布林 ${killed}/${total}`,bx+70,by+bH+16,'#cc6666',12,'left');

        const lt=this.currentLayer===1?'地牢下层':'地牢上层';
        this.drawPixelText(ctx,lt,CANVAS_W-16,26,'rgba(200,200,220,0.5)',12,'right');

        // 技能冷却提示
        const skCD = Math.ceil(player.skillCooldown);
        if (skCD > 0) {
            this.drawPixelText(ctx,`技能 ${skCD}s`,CANVAS_W-16,46,'#6688aa',11,'right');
        } else {
            this.drawPixelText(ctx,'技能 就绪',CANVAS_W-16,46,'#66ccff',11,'right');
        }
    },

    drawPixelText(ctx, text, x, y, color, size, align) {
        ctx.font=`bold ${size}px "Microsoft YaHei",sans-serif`;
        ctx.textAlign=align||'left'; ctx.textBaseline='middle';
        ctx.strokeStyle='rgba(0,0,0,0.7)'; ctx.lineWidth=3; ctx.strokeText(text,x,y);
        ctx.fillStyle=color; ctx.fillText(text,x,y);
    }
};

// ===== 主循环 =====
let lastTime = 0;
function loop(time) {
    requestAnimationFrame(loop);
    const dt = Math.min((time-lastTime)/1000, 0.05);
    lastTime = time;
    game.update(dt); game.draw(ctx);
    for (const k in justPressed) justPressed[k] = false;
}

loadAll().then(() => {
    document.getElementById('loading').style.display='none';
    game.init(); requestAnimationFrame(loop);
});
</script>
